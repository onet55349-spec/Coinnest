<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Order | CoinNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .processing-header {
            padding: 30px;
            text-align: center;
        }

        .processing-title {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 50px;
        }

        .countdown-circle-lg {
            width: 220px;
            height: 220px;
            border: 6px solid rgba(255, 179, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 40px;
            box-shadow: 0 0 50px rgba(255, 179, 0, 0.1);
        }

        .countdown-circle-lg svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-text {
            text-align: center;
        }

        .timer-val {
            font-size: 82px;
            font-weight: 900;
            line-height: 1;
            display: block;
        }

        .timer-unit {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
        }

        .details-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 90%;
            max-width: 400px;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .detail-row:last-child { margin-bottom: 0; }

        .detail-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }

        .direction-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .footer-action {
            padding: 20px 30px 40px;
            width: 100%;
            box-sizing: border-box;
            max-width: 460px;
            margin: 0 auto;
        }

        .continue-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(90deg, #00c9a7 0%, #00d2ff 100%);
            color: #000;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 201, 167, 0.3);
            transition: transform 0.2s;
        }

        .continue-btn:active {
            transform: scale(0.98);
        }

        #proc-ring-lg {
            stroke-dasharray: 660;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body>
    <div class="processing-header">
        <h1 class="processing-title">Processing Order</h1>
    </div>

    <div class="timer-container">
        <div class="countdown-circle-lg">
            <svg>
                <circle cx="110" cy="110" r="105" fill="transparent" stroke="#FFB300" stroke-width="6" id="proc-ring-lg"></circle>
            </svg>
            <div class="timer-text">
                <span class="timer-val" id="timer-val">140</span>
                <span class="timer-unit">SECONDS</span>
            </div>
        </div>

        <div class="details-panel">
            <div class="detail-row">
                <span class="detail-label">Trading Pair</span>
                <span class="detail-value">BTC / USDT</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Direction</span>
                <span id="proc-direction" class="direction-badge">---</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Buy Price</span>
                <span class="detail-value" id="proc-buy-price">0.00</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Current Price</span>
                <span class="detail-value" id="proc-curr-price" style="color: #00c9a7;">0.00</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Total Volume</span>
                <span class="detail-value" id="proc-lots">0.00 USDT</span>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="continue-btn" onclick="window.location.href='trade.html'">Continue to trade</button>
    </div>

    <script>
        let timeLeft = 140;
        const totalOffset = 660;

        function updateLivePrice() {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                .then(r => r.json())
                .then(data => {
                    const price = parseFloat(data.price).toLocaleString(undefined, { minimumFractionDigits: 2 });
                    document.getElementById('proc-curr-price').innerText = price;
                })
                .catch(e => console.error(e));
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Load Trade data from LocalStorage
            const tradeData = JSON.parse(localStorage.getItem('current_pending_trade') || '{}');
            
            if (tradeData.direction) {
                const dirEl = document.getElementById('proc-direction');
                dirEl.innerText = tradeData.direction.toUpperCase();
                dirEl.style.background = tradeData.direction.includes('BUY') ? '#00c9a7' : '#ff4d4d';
                dirEl.style.color = '#000';
                
                document.getElementById('proc-buy-price').innerText = tradeData.buyPrice;
                document.getElementById('proc-lots').innerText = tradeData.amount + ' USDT';
            }

            updateLivePrice();
            setInterval(updateLivePrice, 3000);

            const ring = document.getElementById('proc-ring-lg');
            const timerEl = document.getElementById('timer-val');

            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                
                const offset = totalOffset - (timeLeft / 140) * totalOffset;
                ring.style.strokeDashoffset = offset;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("Trading cycle complete. Your order has been settled.");
                    window.location.href = 'trade.html';
                }
            }, 1000);
        });
    </script>
</body>
</html>
